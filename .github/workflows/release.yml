name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: release-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            release-${{ runner.os }}-go-

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /tmp /home/runner
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell
          echo "=== Disk space after cleanup ==="
          df -h /tmp /home/runner

      - name: Install build deps (envshim, fuse, seccomp)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libseccomp-dev \
            libfuse-dev \
            pkg-config \
            gcc-aarch64-linux-gnu \
            make

      - name: Test
        run: |
          mkdir -p "$GOTMPDIR"
          go test -p=1 ./...
        env:
          GOTMPDIR: ${{ runner.temp }}/go-tmp

      - name: Smoke
        run: make smoke

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.13.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Alpine/musl binaries separately (requires different libc)
  alpine-build:
    runs-on: ubuntu-latest
    needs: goreleaser  # Wait for release to be created
    timeout-minutes: 20
    container:
      image: golang:1.25.7-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install Alpine build dependencies
        run: |
          apk add --no-cache \
            gcc \
            musl-dev \
            libseccomp-dev \
            libseccomp-static \
            make \
            git \
            file

      - name: Build agentsh (Alpine/musl static)
        run: |
          CGO_ENABLED=1 \
          CGO_LDFLAGS="-static -lseccomp" \
          go build -ldflags='-s -w -extldflags "-static"' \
            -o agentsh ./cmd/agentsh

          # Verify it's statically linked
          file agentsh

      - name: Build agentsh-unixwrap (Alpine/musl static)
        run: |
          CGO_ENABLED=1 \
          CGO_LDFLAGS="-static -lseccomp" \
          go build -ldflags='-s -w -extldflags "-static"' \
            -o agentsh-unixwrap ./cmd/agentsh-unixwrap

          # Verify it's statically linked
          file agentsh-unixwrap

      - name: Build agentsh-shell-shim (Alpine/musl)
        run: |
          CGO_ENABLED=0 \
          go build -ldflags='-s -w' \
            -o agentsh-shell-shim ./cmd/agentsh-shell-shim

      - name: Create Alpine tarball
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          tar -czvf "dist/agentsh_${VERSION}_linux_amd64_musl.tar.gz" \
            agentsh \
            agentsh-unixwrap \
            agentsh-shell-shim \
            packaging/bash_startup.sh \
            README.md \
            LICENSE \
            config.yml \
            default-policy.yml

      - name: Upload Alpine binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Install gh CLI in Alpine
          apk add --no-cache github-cli

          gh release upload "$VERSION" \
            "dist/agentsh_${VERSION}_linux_amd64_musl.tar.gz" \
            --repo "${{ github.repository }}" \
            --clobber

  # Sign and notarize macOS binaries produced by GoReleaser.
  sign-macos:
    runs-on: macos-latest
    needs: goreleaser
    environment: build
    timeout-minutes: 20
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          MACOS_SIGNING_CERT_P12: ${{ secrets.MACOS_SIGNING_CERT_P12 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          echo "$MACOS_SIGNING_CERT_P12" | base64 --decode > cert.p12
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

      - name: Download release archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          ARCHIVE="agentsh_${VERSION#v}_darwin_${{ matrix.arch }}.tar.gz"
          gh release download "$VERSION" \
            --pattern "$ARCHIVE" \
            --repo "${{ github.repository }}" \
            --dir .
          mkdir -p unsigned
          tar -xzf "$ARCHIVE" -C unsigned

      - name: Sign binaries
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          for bin in unsigned/agentsh unsigned/agentsh-shell-shim; do
            [ -f "$bin" ] || continue
            codesign --force --sign "$SIGNING_IDENTITY" \
              --entitlements macos/AgentSH/AgentSH.entitlements \
              --options runtime --timestamp \
              "$bin"
            codesign --verify --strict "$bin"
          done

      - name: Notarize binaries
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Create a zip for notarization (notarytool requires zip/dmg/pkg)
          NOTARIZE_ZIP="agentsh-notarize-${{ matrix.arch }}.zip"
          ditto -c -k --keepParent unsigned "$NOTARIZE_ZIP"
          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --wait --timeout 10m
          rm "$NOTARIZE_ZIP"

      - name: Re-package signed archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          ARCHIVE="agentsh_${VERSION#v}_darwin_${{ matrix.arch }}.tar.gz"
          tar -czf "$ARCHIVE" -C unsigned .
          gh release upload "$VERSION" "$ARCHIVE" \
            --repo "${{ github.repository }}" \
            --clobber

  # Update checksums after macOS signing replaces the darwin archives.
  update-checksums:
    runs-on: ubuntu-latest
    needs: [goreleaser, alpine-build, sign-macos]
    timeout-minutes: 10
    steps:
      - name: Download all release assets and regenerate checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p assets
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --skip-existing
          # Remove old checksums file
          rm -f assets/checksums.txt
          # Generate new checksums for all assets
          cd assets
          sha256sum * > checksums.txt
          cd ..
          gh release upload "$VERSION" assets/checksums.txt \
            --repo "${{ github.repository }}" \
            --clobber

  # Run integration tests across all supported Linux distros.
  docker-test:
    runs-on: ubuntu-latest
    needs: [goreleaser, alpine-build]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            dockerfile: Dockerfile.test
            docker_run_flags: ""
          - name: fedora
            dockerfile: Dockerfile.test.rpm
            docker_run_flags: ""
          - name: archlinux
            dockerfile: Dockerfile.test.arch
            docker_run_flags: ""
          - name: alpine
            dockerfile: Dockerfile.test.alpine
            docker_run_flags: ""
          - name: ubuntu
            dockerfile: Dockerfile.test.ubuntu
            docker_run_flags: "--device /dev/fuse --cap-add SYS_ADMIN"
    steps:
      - uses: actions/checkout@v4

      - name: Build and run ${{ matrix.name }} integration test
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg AGENTSH_TAG=${{ github.ref_name }} \
            -t agentsh-test-${{ matrix.name }}:latest .
          RUN_FLAGS="${{ matrix.docker_run_flags }}"
          # Only pass FUSE flags if /dev/fuse exists on the runner
          if echo "$RUN_FLAGS" | grep -q '/dev/fuse' && [ ! -e /dev/fuse ]; then
            echo "::warning::Skipping FUSE flags: /dev/fuse not available on this runner"
            RUN_FLAGS=""
          fi
          docker run --rm $RUN_FLAGS agentsh-test-${{ matrix.name }}:latest
