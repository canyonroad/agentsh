name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          # Namespace bumped to v2 and salted with the libseccomp build
          # script hash. Same reasoning as ci.yml: caches from before the
          # libseccomp 2.6 static build carry libseccomp-golang cgo artifacts
          # compiled against 2.5 headers (stub bodies for 2.6-only functions
          # plus bare `-lseccomp` from system pkg-config). Relinking those
          # against the 2.6 static .a produces duplicate-definition errors.
          # Including hashFiles('scripts/build-libseccomp.sh') ensures any
          # future libseccomp version bump invalidates stale artifacts.
          key: release-v2-${{ runner.os }}-go-seccomp${{ hashFiles('scripts/build-libseccomp.sh') }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            release-v2-${{ runner.os }}-go-seccomp${{ hashFiles('scripts/build-libseccomp.sh') }}-

      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h /tmp /home/runner
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/share/powershell
          echo "=== Disk space after cleanup ==="
          df -h /tmp /home/runner

      - name: Install build deps (envshim, fuse, seccomp)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse-dev \
            pkg-config \
            gcc-aarch64-linux-gnu \
            make \
            gpg \
            gperf

      - name: Build static libseccomp 2.6 (amd64 + arm64)
        run: |
          TARGET=amd64 ./scripts/build-libseccomp.sh
          TARGET=arm64 ./scripts/build-libseccomp.sh
          echo "=== libseccomp artifacts ==="
          ls -la /opt/libseccomp/amd64/lib/libseccomp.a /opt/libseccomp/arm64/lib/libseccomp.a

      - name: Test
        run: |
          mkdir -p "$GOTMPDIR"
          go test -p=1 ./...
        env:
          GOTMPDIR: ${{ runner.temp }}/go-tmp
          PKG_CONFIG_LIBDIR: /opt/libseccomp/amd64/lib/pkgconfig

      - name: Smoke
        run: make smoke
        env:
          PKG_CONFIG_LIBDIR: /opt/libseccomp/amd64/lib/pkgconfig

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.13.1
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build Alpine/musl binaries separately (requires different libc).
  #
  # We intentionally do NOT use `container: golang:1.25.7-alpine` at the job
  # level, because on arm64 GitHub runners this breaks JavaScript actions
  # (actions/checkout@v4): Node.js is not shipped for the Alpine-on-arm64
  # combo. Instead, the job runs on a plain ubuntu-* host, checkout happens
  # there, and the actual musl/CGO compile is delegated to `docker run`
  # against the multi-arch golang:alpine image. Docker pulls the matching
  # arch variant natively on each runner (no QEMU needed).
  alpine-build:
    needs: goreleaser  # Wait for release to be created
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs-on: ubuntu-latest
          - arch: arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4

      - name: Build musl-static binaries in Alpine container
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          # Keep the build script in a temp file so we avoid quoting hell
          # around -ldflags='-s -w -extldflags "-static"' inside docker run.
          cat > /tmp/alpine-build.sh <<'SCRIPT'
          #!/bin/sh
          set -eux
          apk add --no-cache gcc musl-dev libseccomp-dev libseccomp-static make git file

          # The repo is mounted from the host runner at /workspace. Files are
          # owned by the host uid (e.g. 1001) but this container runs as root,
          # so git refuses to operate on it (safe.directory check). Go's build
          # VCS stamping invokes git and fails with "exit status 128". Mark
          # the workspace as safe before any go build commands.
          git config --global --add safe.directory /workspace

          CGO_ENABLED=1 \
          CGO_LDFLAGS="-static -lseccomp" \
          go build -ldflags='-s -w -extldflags "-static"' \
            -o agentsh ./cmd/agentsh
          file agentsh

          CGO_ENABLED=1 \
          CGO_LDFLAGS="-static -lseccomp" \
          go build -ldflags='-s -w -extldflags "-static"' \
            -o agentsh-unixwrap ./cmd/agentsh-unixwrap
          file agentsh-unixwrap

          CGO_ENABLED=0 \
          go build -ldflags='-s -w' \
            -o agentsh-shell-shim ./cmd/agentsh-shell-shim

          mkdir -p dist
          tar -czvf "dist/agentsh_${VERSION}_linux_${ARCH}_musl.tar.gz" \
            agentsh \
            agentsh-unixwrap \
            agentsh-shell-shim \
            packaging/bash_startup.sh \
            README.md \
            LICENSE \
            config.yml \
            default-policy.yml
          SCRIPT
          chmod +x /tmp/alpine-build.sh

          docker run --rm \
            -v "$PWD:/workspace" \
            -v "/tmp/alpine-build.sh:/alpine-build.sh:ro" \
            -w /workspace \
            -e VERSION \
            -e ARCH \
            golang:1.25.7-alpine \
            /alpine-build.sh

          # Files created inside the container are root-owned on the host.
          # Chown them back so subsequent host-side steps can read them.
          sudo chown -R "$(id -u):$(id -g)" dist agentsh agentsh-unixwrap agentsh-shell-shim 2>/dev/null || true

      - name: Upload Alpine binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          gh release upload "$VERSION" \
            "dist/agentsh_${VERSION}_linux_${ARCH}_musl.tar.gz" \
            --repo "${{ github.repository }}" \
            --clobber

  # Build, sign, and notarize macOS app bundle with system extension.
  build-macos-app:
    runs-on: macos-latest
    needs: goreleaser
    environment: build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Import signing certificate
        env:
          MACOS_SIGNING_CERT_P12: ${{ secrets.MACOS_SIGNING_CERT_P12 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          echo "$MACOS_SIGNING_CERT_P12" | base64 --decode > cert.p12
          KEYCHAIN="build.keychain"
          KEYCHAIN_PASSWORD="actions"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import cert.p12 -k "$KEYCHAIN" -P "$MACOS_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          rm cert.p12

      - name: Download darwin archives from GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          for arch in amd64 arm64; do
            ARCHIVE="agentsh_${VERSION#v}_darwin_${arch}.tar.gz"
            gh release download "$VERSION" \
              --pattern "$ARCHIVE" \
              --repo "${{ github.repository }}" \
              --dir .
            mkdir -p "unsigned-${arch}"
            tar -xzf "$ARCHIVE" -C "unsigned-${arch}"
          done

      - name: Rebuild agentsh with CGO for system extension support
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION#v} -X main.commit=$(git rev-parse --short HEAD)"
          # Build for both architectures with CGO enabled (nofuse: macFUSE headers not available on CI)
          CGO_ENABLED=1 GOARCH=arm64 go build -tags nofuse -ldflags "$LDFLAGS" \
            -o build/agentsh-arm64 ./cmd/agentsh
          CGO_ENABLED=1 GOARCH=amd64 go build -tags nofuse -ldflags "$LDFLAGS" \
            -o build/agentsh-amd64 ./cmd/agentsh
          # Replace goreleaser-built agentsh with CGO-enabled builds
          cp build/agentsh-arm64 unsigned-arm64/agentsh
          cp build/agentsh-amd64 unsigned-amd64/agentsh

      - name: Create and sign universal Go binaries
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          mkdir -p build/go-universal
          # Lipo each Mach-O binary into a universal
          for bin in unsigned-arm64/agentsh*; do
            name=$(basename "$bin")
            [ -f "$bin" ] || continue
            file "$bin" | grep -q "Mach-O" || continue
            amd64_bin="unsigned-amd64/${name}"
            if [ -f "$amd64_bin" ]; then
              lipo -create -output "build/go-universal/${name}" \
                "$bin" "$amd64_bin"
              echo "Created universal binary: ${name}"
            else
              cp "$bin" "build/go-universal/${name}"
              echo "Copied arm64-only binary: ${name}"
            fi
          done
          # Sign and verify each binary
          signed=0
          for bin in build/go-universal/*; do
            echo "--- $(basename "$bin") ---"
            lipo -info "$bin"
            # Use minimal entitlements for shim binaries
            if echo "$bin" | grep -q "agentsh-shell-shim"; then
              codesign --force --sign "$SIGNING_IDENTITY" \
                --options runtime --timestamp \
                "$bin"
            else
              codesign --force --sign "$SIGNING_IDENTITY" \
                --entitlements macos/AgentSH/agentsh/agentsh.entitlements \
                --options runtime --timestamp \
                "$bin"
            fi
            codesign --verify --strict "$bin"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::No binaries were signed"
            exit 1
          fi
          echo "Signed $signed binaries"

      - name: Build Swift targets (universal)
        run: |
          xcodebuild \
            -project macos/agentsh/agentsh.xcodeproj \
            -scheme agentsh \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Assemble app bundle
        run: |
          # Copy signed Go binaries
          mkdir -p build/AgentSH.app/Contents/MacOS
          cp build/go-universal/* build/AgentSH.app/Contents/MacOS/

          # Copy Info.plist for host app
          cp macos/AgentSH-files/Info.plist build/AgentSH.app/Contents/

          # Copy Swift build products from DerivedData
          PRODUCTS="build/DerivedData/Build/Products/Release"

          # System Extension (Xcode names the product with the full bundle ID)
          mkdir -p "build/AgentSH.app/Contents/Library/SystemExtensions"
          cp -R "${PRODUCTS}/ai.canyonroad.agentsh.SysExt.systemextension" \
            "build/AgentSH.app/Contents/Library/SystemExtensions/"

          # XPC Service
          mkdir -p "build/AgentSH.app/Contents/XPCServices"
          cp -R "${PRODUCTS}/xpc.xpc" \
            "build/AgentSH.app/Contents/XPCServices/"

          # Approval Dialog
          mkdir -p "build/AgentSH.app/Contents/Resources"
          cp -R "${PRODUCTS}/approval-dialog.app" \
            "build/AgentSH.app/Contents/Resources/"

          # Provisioning profile (required for restricted entitlements like system-extension.install)
          cp macos/AgentSH/AgentSH_Distribution.provisionprofile \
            "build/AgentSH.app/Contents/embedded.provisionprofile"

          # Default config and policies (used as fallback when no user/system config exists)
          cp config.yml "build/AgentSH.app/Contents/Resources/"
          cp default-policy.yml "build/AgentSH.app/Contents/Resources/"
          mkdir -p "build/AgentSH.app/Contents/Resources/policies"
          cp configs/policies/*.yaml "build/AgentSH.app/Contents/Resources/policies/"

          echo "=== App bundle structure ==="
          find build/AgentSH.app -type f | sort

      - name: Sign app bundle (inside-out)
        env:
          SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          # 1. System Extension
          codesign --force --sign "$SIGNING_IDENTITY" \
            --entitlements macos/AgentSH/SysExt.entitlements \
            --options runtime --timestamp \
            "build/AgentSH.app/Contents/Library/SystemExtensions/ai.canyonroad.agentsh.SysExt.systemextension"

          # 2. XPC Service
          codesign --force --sign "$SIGNING_IDENTITY" \
            --options runtime --timestamp \
            "build/AgentSH.app/Contents/XPCServices/xpc.xpc"

          # 3. Approval Dialog
          codesign --force --sign "$SIGNING_IDENTITY" \
            --entitlements macos/AgentSH/approval-dialog/approval-dialog.entitlements \
            --options runtime --timestamp \
            "build/AgentSH.app/Contents/Resources/approval-dialog.app"

          # 4. Main app bundle
          codesign --force --sign "$SIGNING_IDENTITY" \
            --entitlements macos/AgentSH/agentsh/agentsh.entitlements \
            --options runtime --timestamp \
            "build/AgentSH.app"

          # 5. Verify
          codesign --verify --deep --strict --verbose=2 "build/AgentSH.app"

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          TEAM_ID: ${{ secrets.MACOS_NOTARIZATION_TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/AgentSH.app build/AgentSH.zip

          # Submit and capture submission ID
          SUBMIT_OUT=$(xcrun notarytool submit build/AgentSH.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --output-format json)
          echo "$SUBMIT_OUT"
          SUBMISSION_ID=$(echo "$SUBMIT_OUT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Submission ID: $SUBMISSION_ID"

          # Wait for completion (best-effort — if it times out, use staple-macos workflow later)
          if xcrun notarytool wait "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$TEAM_ID" \
            --timeout 35m; then
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$TEAM_ID"
            xcrun stapler staple build/AgentSH.app
            echo "NOTARIZED=true" >> "$GITHUB_ENV"
          else
            echo "::warning::Notarization timed out (submission $SUBMISSION_ID). Run staple-macos workflow later."
            xcrun notarytool info "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$TEAM_ID" || true
            echo "NOTARIZED=false" >> "$GITHUB_ENV"
          fi

      - name: Create DMG and upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Create DMG
          hdiutil create -volname "AgentSH" \
            -srcfolder build/AgentSH.app \
            -ov -format UDZO \
            "build/AgentSH-${VERSION}.dmg"

          # Delete old darwin tarballs from release
          for arch in amd64 arm64; do
            ARCHIVE="agentsh_${VERSION#v}_darwin_${arch}.tar.gz"
            gh release delete-asset "$VERSION" "$ARCHIVE" \
              --repo "${{ github.repository }}" \
              --yes || true
          done

          # Upload DMG
          gh release upload "$VERSION" "build/AgentSH-${VERSION}.dmg" \
            --repo "${{ github.repository }}" \
            --clobber

  # Update checksums after macOS signing replaces the darwin archives.
  update-checksums:
    runs-on: ubuntu-latest
    needs: [goreleaser, alpine-build, build-macos-app]
    timeout-minutes: 10
    steps:
      - name: Download all release assets and regenerate checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p assets
          gh release download "$VERSION" \
            --repo "${{ github.repository }}" \
            --dir assets \
            --skip-existing
          # Remove old checksums file
          rm -f assets/checksums.txt
          # Generate new checksums for all assets
          cd assets
          sha256sum * > checksums.txt
          cd ..
          gh release upload "$VERSION" assets/checksums.txt \
            --repo "${{ github.repository }}" \
            --clobber

  # Publish Homebrew cask to canyonroad/homebrew-tap (stable releases only).
  publish-homebrew-cask:
    runs-on: ubuntu-latest
    needs: [build-macos-app]
    if: "!contains(github.ref_name, '-')"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Download DMG and compute SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release download "$VERSION" \
            --pattern "AgentSH-*.dmg" \
            --repo "${{ github.repository }}" \
            --dir .
          DMG_FILE=$(ls AgentSH-*.dmg)
          if [ "$(echo "$DMG_FILE" | wc -l)" -ne 1 ]; then
            echo "::error::Expected exactly one DMG file, found: $DMG_FILE"
            exit 1
          fi
          SHA256=$(sha256sum "$DMG_FILE" | awk '{print $1}')
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"
          echo "CLEAN_VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Generate cask formula from template
        run: |
          sed -e "s/__VERSION__/$CLEAN_VERSION/g" \
              -e "s/__SHA256__/$SHA256/g" \
              scripts/homebrew-cask.rb.tmpl > agentsh.rb
          echo "--- Generated cask formula ---"
          cat agentsh.rb

      - name: Push to homebrew-tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/canyonroad/homebrew-tap.git" tap
          mkdir -p tap/Casks
          cp agentsh.rb tap/Casks/agentsh.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/agentsh.rb
          git diff --cached --quiet || git commit -m "Update agentsh cask to ${CLEAN_VERSION}"
          git push

  # Run integration tests across all supported Linux distros.
  docker-test:
    runs-on: ubuntu-latest
    needs: [goreleaser, alpine-build]
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: debian
            dockerfile: Dockerfile.test
            docker_run_flags: ""
          - name: fedora
            dockerfile: Dockerfile.test.rpm
            docker_run_flags: ""
          - name: archlinux
            dockerfile: Dockerfile.test.arch
            docker_run_flags: ""
          - name: alpine
            dockerfile: Dockerfile.test.alpine
            docker_run_flags: ""
          - name: ubuntu
            dockerfile: Dockerfile.test.ubuntu
            docker_run_flags: "--device /dev/fuse --cap-add SYS_ADMIN"
          - name: ubuntu2204
            dockerfile: Dockerfile.test.ubuntu2204
            docker_run_flags: "--device /dev/fuse --cap-add SYS_ADMIN"
    steps:
      - uses: actions/checkout@v4

      - name: Build and run ${{ matrix.name }} integration test
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          docker build -f ${{ matrix.dockerfile }} \
            --build-arg AGENTSH_TAG=${{ github.ref_name }} \
            -t agentsh-test-${{ matrix.name }}:latest .
          RUN_FLAGS="${{ matrix.docker_run_flags }}"
          # Only pass FUSE flags if /dev/fuse exists on the runner
          if echo "$RUN_FLAGS" | grep -q '/dev/fuse' && [ ! -e /dev/fuse ]; then
            echo "::warning::Skipping FUSE flags: /dev/fuse not available on this runner"
            RUN_FLAGS=""
          fi
          docker run --rm $RUN_FLAGS agentsh-test-${{ matrix.name }}:latest
