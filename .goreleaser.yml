version: 2
project_name: agentsh

before:
  hooks:
    - go mod download
    - ./scripts/build-envshim.sh
    - ./scripts/build-ptracer.sh

builds:
  # Linux amd64: CGO enabled for full seccomp user-notify support
  - id: agentsh-linux-amd64
    main: ./cmd/agentsh
    binary: agentsh
    env:
      - CGO_ENABLED=1
      # Fail-closed: PKG_CONFIG_LIBDIR REPLACES the default search path
      # rather than augmenting it. If /opt/libseccomp/amd64/... is missing,
      # pkg-config errors instead of silently falling back to the distro's
      # 2.5.x libseccomp. The compile-time #error guard then catches
      # anything that slips through.
      - PKG_CONFIG_LIBDIR=/opt/libseccomp/amd64/lib/pkgconfig
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  # Linux arm64: CGO enabled for seccomp user-notify support (cross-compiled)
  - id: agentsh-linux-arm64
    main: ./cmd/agentsh
    binary: agentsh
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      # Fail-closed: see amd64 comment. Replaces the default arm64
      # pkgconfig path so a missing libseccomp 2.6 install fails the
      # build instead of picking up the distro 2.5.x.
      - PKG_CONFIG_LIBDIR=/opt/libseccomp/arm64/lib/pkgconfig
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: agentsh-darwin
    main: ./cmd/agentsh
    binary: agentsh
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: agentsh-windows
    main: ./cmd/agentsh
    binary: agentsh
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

  - id: shim-linux
    main: ./cmd/agentsh-shell-shim
    binary: agentsh-shell-shim
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: shim-darwin
    main: ./cmd/agentsh-shell-shim
    binary: agentsh-shell-shim
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  # unixwrap: seccomp wrapper for Linux amd64 (requires CGO + libseccomp)
  - id: unixwrap-linux-amd64
    main: ./cmd/agentsh-unixwrap
    binary: agentsh-unixwrap
    env:
      - CGO_ENABLED=1
      # Link the static libseccomp 2.6 built by scripts/build-libseccomp.sh.
      # Only libseccomp.a is installed (no .so), so the linker picks it
      # statically despite the plain -lseccomp. Leave glibc dynamic —
      # Alpine builds are the fully-static variant.
      # PKG_CONFIG_LIBDIR (not _PATH) replaces the default search path so
      # a missing install fails the build instead of silently linking the
      # distro's pre-2.6 libseccomp.
      - PKG_CONFIG_LIBDIR=/opt/libseccomp/amd64/lib/pkgconfig
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w

  # unixwrap: seccomp wrapper for Linux arm64 (cross-compiled)
  - id: unixwrap-linux-arm64
    main: ./cmd/agentsh-unixwrap
    binary: agentsh-unixwrap
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      # Point PKG_CONFIG_LIBDIR at our static libseccomp 2.6 for arm64.
      # The previous /usr/lib/aarch64-linux-gnu/pkgconfig picked up the
      # 2.5.x from apt, which silently disabled Layer 1 of the SIGURG fix.
      - PKG_CONFIG_LIBDIR=/opt/libseccomp/arm64/lib/pkgconfig
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w

  # stub: exec redirect proxy for FUSE/seccomp interception
  - id: stub-linux
    main: ./cmd/agentsh-stub
    binary: agentsh-stub
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: stub-darwin
    main: ./cmd/agentsh-stub
    binary: agentsh-stub
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  # macwrap: XPC sandbox wrapper for macOS (requires CGO)
  # NOTE: This build requires macOS with Xcode to compile - SKIPPED in CI
  # Build locally with: CGO_ENABLED=1 go build -o bin/agentsh-macwrap ./cmd/agentsh-macwrap
  # - id: macwrap-darwin
  #   main: ./cmd/agentsh-macwrap
  #   binary: agentsh-macwrap
  #   env:
  #     - CGO_ENABLED=1
  #   goos:
  #     - darwin
  #   goarch:
  #     - amd64
  #     - arm64
  #   ldflags:
  #     - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: agentsh-linux
    ids:
      - agentsh-linux-amd64
      - agentsh-linux-arm64
      - shim-linux
      - unixwrap-linux-amd64
      - unixwrap-linux-arm64
      - stub-linux
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config.yml
      - default-policy.yml
      - src: configs/policies/*.yaml
        dst: policies
        strip_parent: true
      - src: build/envshim/linux_{{ .Arch }}/*
        dst: .
        strip_parent: true
      - src: build/ptracer/linux_{{ .Arch }}/*
        dst: .
        strip_parent: true
      - packaging/bash_startup.sh
    builds_info:
      mode: 0755
      group: root
      owner: root

  - id: agentsh-darwin
    ids:
      - agentsh-darwin
      - shim-darwin
      - stub-darwin
      # macwrap-darwin excluded - requires native macOS build
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config.yml
      - default-policy.yml
      - src: configs/policies/*.yaml
        dst: policies
        strip_parent: true

  - id: agentsh-windows
    ids:
      - agentsh-windows
    formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_windows_{{ .Arch }}"
    files:
      - README.md
      - LICENSE
      - config.yml
      - default-policy.yml
      - src: configs/policies/*.yaml
        dst: policies
        strip_parent: true

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: agentsh
    package_name: agentsh
    ids:
      - agentsh-linux-amd64
      - agentsh-linux-arm64
      - shim-linux
      - unixwrap-linux-amd64
      - unixwrap-linux-arm64
      - stub-linux
    formats:
      - deb
      - rpm
      - archlinux
    bindir: /usr/bin
    vendor: AgentSH
    homepage: https://github.com/agentsh/agentsh
    maintainer: AgentSH Team <team@agentsh.dev>
    description: |
      Secure sandboxed shell for AI agents.
      Provides policy-based access control for file, network, and command operations.
    license: MIT
    section: utils
    priority: optional
    contents:
      # Configuration
      - src: packaging/config.yaml
        dst: /etc/agentsh/config.yaml
        type: config|noreplace
        file_info:
          mode: 0644
      # Shell completions
      - src: packaging/completions/agentsh.bash
        dst: /usr/share/bash-completion/completions/agentsh
        file_info:
          mode: 0644
      - src: packaging/completions/agentsh.zsh
        dst: /usr/share/zsh/site-functions/_agentsh
        file_info:
          mode: 0644
      - src: packaging/completions/agentsh.fish
        dst: /usr/share/fish/vendor_completions.d/agentsh.fish
        file_info:
          mode: 0644
      # Documentation
      - src: README.md
        dst: /usr/share/doc/agentsh/README.md
        file_info:
          mode: 0644
      - src: LICENSE
        dst: /usr/share/doc/agentsh/LICENSE
        file_info:
          mode: 0644
      # Envshim library (Linux only) - uses glob to skip if not built
      - src: build/envshim/linux_{{ .Arch }}/*.so
        dst: /usr/lib/agentsh/
      # Ptracer LD_PRELOAD library (Linux only) - Yama ptrace_scope workaround
      - src: build/ptracer/linux_{{ .Arch }}/*.so
        dst: /usr/lib/agentsh/
      # Bash startup script for environment injection
      - src: packaging/bash_startup.sh
        dst: /usr/lib/agentsh/bash_startup.sh
        file_info:
          mode: 0755
      # Policy files
      - src: configs/policies/*.yaml
        dst: /etc/agentsh/policies/
        type: config|noreplace
        file_info:
          mode: 0644
      # Create directories
      - dst: /etc/agentsh
        type: dir
        file_info:
          mode: 0755
      - dst: /etc/agentsh/policies
        type: dir
        file_info:
          mode: 0755
      - dst: /usr/lib/agentsh
        type: dir
        file_info:
          mode: 0755
    rpm:
      group: Applications/System
    archlinux:
      pkgbase: agentsh

release:
  draft: false
  prerelease: auto

# Homebrew cask is published by the publish-homebrew-cask job in release.yml
# (not managed by GoReleaser — the cask installs the signed DMG, not raw binaries)
